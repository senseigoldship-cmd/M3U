let extras = [];
const REPO = 'senseigoldship-cmd/IPTV-repository';
let linkAtual = '';

function montar(filtro) {
  const c = document.getElementById('container');
  const todos = [...CANAIS, ...extras];
  c.innerHTML = '';
  todos.forEach((ch,i) => {
    if (filtro && !ch.n.toLowerCase().includes(filtro.toLowerCase()) && !ch.t.toLowerCase().includes(filtro.toLowerCase())) return;
    const d = document.createElement('div');
    d.className = 'canal';
    d.innerHTML = '<input type="checkbox" id="c'+i+'"><span>'+ch.n+'</span><span class="tag">'+ch.t+'</span>';
    d.querySelector('input').onchange = () => contar();
    d.onclick = (e) => {
      if (e.target.tagName === 'INPUT') return;
      const cb = d.querySelector('input');
      cb.checked = !cb.checked;
      contar();
    };
    c.appendChild(d);
  });
  contar();
}

function contar() {
  const n = document.querySelectorAll('#container input:checked').length;
  const t = document.querySelectorAll('#container input').length;
  document.getElementById('contagem').textContent = n+' de '+t+' selecionados';
}

function msg(t) {
  const el = document.getElementById('msg');
  el.textContent = t;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

document.getElementById('btnTodos').onclick = () => {
  document.querySelectorAll('#container input').forEach(c => { c.checked = true; });
  contar();
};
document.getElementById('btnLimpar').onclick = () => {
  document.querySelectorAll('#container input').forEach(c => { c.checked = false; });
  contar();
};

document.getElementById('filtroBusca').oninput = function() { montar(this.value); };

document.getElementById('btnAdd').onclick = () => {
  const nome = document.getElementById('addNome').value.trim();
  const link = document.getElementById('addLink').value.trim();
  const tag = (document.getElementById('addTag').value.trim() || 'GERAL').toUpperCase();
  if (!nome || !link) { msg('Preencha nome e link!'); return; }
  if (!link.startsWith('http')) { msg('Link inválido!'); return; }
  extras.push({id:'e'+Date.now(),n:nome,t:tag,s:link});
  document.getElementById('addNome').value = '';
  document.getElementById('addLink').value = '';
  document.getElementById('addTag').value = '';
  montar(document.getElementById('filtroBusca').value);
  renderChips();
  msg('✅ '+nome+' adicionado!');
};

function renderChips() {
  const b = document.getElementById('chips');
  b.innerHTML = extras.map((ch,i) => '<span class="chip">'+ch.n+' ['+ch.t+'] <span class="x" onclick="removerExt('+i+')">✕</span></span>').join('');
}
function removerExt(i) {
  extras.splice(i,1);
  montar(document.getElementById('filtroBusca').value);
  renderChips();
}

document.getElementById('btnGerar').onclick = function() {
  const checks = document.querySelectorAll('#container input:checked');
  const indices = [];
  checks.forEach(c => {
    const divs = [...document.getElementById('container').children];
    const idx = divs.indexOf(c.parentElement);
    if (idx >= 0) indices.push(idx);
  });
  if (!indices.length) { msg('Selecione canais!'); return; }

  const nome = document.getElementById('inputUser').value.trim() || 'Playlist';
  const data = new Date().toLocaleString('pt-BR');
  const todos = [...CANAIS, ...extras];

  let m3u = '#EXTM3U\n#PLAYLIST:M3U Brasil - '+nome+'\n#DESCRIPTION:'+indices.length+' canais | '+data+'\n';
  indices.forEach(i => {
    const ch = todos[i];
    m3u += '#EXTINF:-1 tvg-id="'+ch.id+'" tvg-name="'+ch.n.replace(/[^\w\sÀ-ü]/g,'').trim()+'" group-title="'+ch.t+'",'+ch.n+'\n'+ch.s+'\n\n';
  });

  // Download
  const nomeArq = 'playlist-brasil-'+nome.replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.m3u';
  const blob = new Blob([m3u], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nomeArq;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  // Link
  linkAtual = 'https://raw.githubusercontent.com/'+REPO+'/main/'+nomeArq;
  const lb = document.getElementById('linkBox');
  lb.innerHTML = '<strong>✅ Playlist gerada! ('+indices.length+' canais)</strong><br><br>'
    + '📁 Arquivo: <strong>'+nomeArq+'</strong><br><br>'
    + '🔗 Link RAW (após upload):<br>'
    + '<a href="'+linkAtual+'" target="_blank" style="color:#0f0;font-size:14px;">'+linkAtual+'</a><br><br>'
    + '📤 <span style="color:#ff6666;">Upload no GitHub:</span><br>'
    + '<a href="https://github.com/'+REPO+'/upload/main" target="_blank" style="color:#ff6666;">github.com/'+REPO+'/upload/main</a>';
  lb.style.display = 'block';
  msg('✅ Playlist baixada! Link pronto pra upload.');
};

document.getElementById('btnCopy').onclick = () => {
  if (!linkAtual) { msg('Gere primeiro!'); return; }
  navigator.clipboard.writeText(linkAtual).then(() => msg('✅ Link copiado!'));
};

document.getElementById('btnDownload').onclick = () => {
  if (!linkAtual) { msg('Gere primeiro!'); return; }
  window.open(linkAtual, '_blank');
};

montar();
renderChips();
// Pré-marcar 40 canais
setTimeout(() => {
  for (let i=0; i<40; i++) {
    const cb = document.getElementById('c'+i);
    if (cb) { cb.checked = true; }
  }
  contar();
}, 100);
</script>
